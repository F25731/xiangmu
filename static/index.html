<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>资源抓取控制台</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f5f5f2;
      color: #202124;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }
    button, input, textarea { font: inherit; }
    button {
      border: 1px solid #202124;
      background: #202124;
      color: #fff;
      padding: 8px 12px;
      cursor: pointer;
    }
    button.secondary { background: #fff; color: #202124; }
    button.ghost { border-color: #d0d0cc; background: transparent; color: #202124; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    main { width: min(1120px, calc(100% - 32px)); margin: 34px auto 60px; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 { margin: 0; font-size: 24px; }
    h2 { margin: 0 0 14px; font-size: 16px; }
    section {
      background: #fff;
      border: 1px solid #ddd;
      padding: 18px;
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .status {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .metric { border: 1px solid #ddd; padding: 12px; background: #fbfbfa; }
    .metric span { color: #666; }
    .metric strong { display: block; margin-top: 2px; font-size: 20px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .message { min-height: 20px; color: #555; margin-top: 10px; }
    label { display: block; margin: 12px 0 5px; color: #555; }
    input, textarea {
      width: 100%;
      border: 1px solid #cfcfca;
      background: #fff;
      padding: 8px 10px;
      color: #202124;
    }
    textarea { min-height: 86px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .item {
      border-top: 1px solid #e4e4df;
      padding: 14px 0;
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 14px;
    }
    .thumb {
      width: 92px;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #eee;
      border: 1px solid #ddd;
    }
    .item h3 { margin: 0 0 6px; font-size: 15px; }
    .item p { margin: 0 0 8px; color: #555; }
    .links { display: flex; flex-wrap: wrap; gap: 8px; }
    .links a { color: #0b57d0; text-decoration: none; }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      background: rgba(0, 0, 0, .32);
      padding: 24px;
      overflow: auto;
    }
    .modal.open { display: block; }
    .dialog {
      width: min(760px, 100%);
      margin: 28px auto;
      background: #fff;
      border: 1px solid #d7d7d2;
      padding: 20px;
    }
    .dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .dialog-head h2 { margin: 0; }
    .hint { color: #777; margin: 0 0 12px; }
    @media (max-width: 880px) {
      header, .grid { display: block; }
      .status { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>资源抓取控制台</h1>
      <button id="configBtn" class="secondary">配置</button>
    </header>

    <div class="grid">
      <section>
        <h2>运行状态</h2>
        <div class="status">
          <div class="metric"><span>资源</span><strong id="total">0</strong></div>
          <div class="metric"><span>已转存</span><strong id="transferred">0</strong></div>
          <div class="metric"><span>上次新增</span><strong id="inserted">0</strong></div>
          <div class="metric"><span>状态</span><strong id="running">-</strong></div>
        </div>
        <div class="actions">
          <button id="firstBtn">首次抓取</button>
          <button id="scanBtn" class="secondary">扫描更新</button>
          <button id="startBtn" class="secondary">启动定时</button>
          <button id="stopBtn" class="ghost">停止定时</button>
        </div>
        <div class="message" id="message"></div>
      </section>

      <section>
        <h2>当前策略</h2>
        <p class="hint" id="summary">读取中...</p>
        <p class="hint">首次抓取按你设置的 N 条导入；后续定时只扫描最新列表，发现没入库的新资源才抓取。</p>
      </section>
    </div>

    <section>
      <h2>最近资源</h2>
      <div id="items"></div>
    </section>
  </main>

  <div id="configModal" class="modal">
    <div class="dialog">
      <div class="dialog-head">
        <h2>配置</h2>
        <button id="closeConfig" class="ghost">关闭</button>
      </div>
      <p class="hint">这里填一次就行。保存后，定时扫描会按间隔自动发现更新。</p>

      <label>来源地址</label>
      <input id="source_url">

      <div class="form-row">
        <div>
          <label>首次抓取条数</label>
          <input id="first_run_limit" type="number" min="1">
        </div>
        <div>
          <label>抓取间隔秒</label>
          <input id="fetch_interval_seconds" type="number" min="60">
        </div>
      </div>

      <label><input id="enabled" type="checkbox" style="width:auto"> 启用定时扫描</label>
      <label><input id="auto_transfer" type="checkbox" style="width:auto"> 新资源自动转存</label>

      <div class="form-row">
        <div>
          <label>请求间隔秒</label>
          <input id="request_delay_seconds" type="number" min="0.5" step="0.5">
        </div>
        <div>
          <label>百度新分享提取码</label>
          <input id="baidu_new_share_code">
        </div>
      </div>

      <label>夸克 Cookie</label>
      <textarea id="quark_cookie"></textarea>
      <label>夸克保存目录 fid</label>
      <input id="quark_save_fid">

      <label>百度 Cookie</label>
      <textarea id="baidu_cookie"></textarea>
      <label>百度转存目录</label>
      <input id="baidu_transfer_dir">

      <label>OpenList 地址</label>
      <input id="openlist_url">
      <label>OpenList Token</label>
      <textarea id="openlist_token"></textarea>
      <label>OpenList 百度挂载根目录</label>
      <input id="openlist_root_dir">

      <label>广告文件名，一行一个</label>
      <textarea id="delete_names"></textarea>

      <div class="actions">
        <button id="saveBtn">保存配置</button>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const adminToken = new URLSearchParams(location.search).get("token") || localStorage.getItem("adminToken") || "";
    if (adminToken) localStorage.setItem("adminToken", adminToken);
    let currentConfig = {};
    const fields = [
      "source_url", "first_run_limit", "fetch_interval_seconds",
      "request_delay_seconds", "quark_cookie", "quark_save_fid", "baidu_cookie",
      "baidu_new_share_code", "baidu_transfer_dir", "openlist_url",
      "openlist_token", "openlist_root_dir"
    ];

    function msg(text) { $("message").textContent = text || ""; }
    async function api(path, options = {}) {
      const headers = { "Content-Type": "application/json" };
      if (adminToken) headers["X-Admin-Token"] = adminToken;
      const res = await fetch(path, { headers, ...options });
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    }
    async function loadConfig() {
      currentConfig = await api("/api/config");
      for (const key of fields) $(key).value = currentConfig[key] ?? "";
      $("enabled").checked = !!currentConfig.enabled;
      $("auto_transfer").checked = !!currentConfig.auto_transfer;
      $("delete_names").value = (currentConfig.delete_names || []).join("\n");
      renderSummary();
    }
    function renderSummary() {
      $("summary").textContent = `来源：${currentConfig.source_url || "-"}；间隔：${currentConfig.fetch_interval_seconds || "-"} 秒；首次：${currentConfig.first_run_limit || "-"} 条；自动转存：${currentConfig.auto_transfer ? "开" : "关"}`;
    }
    async function saveConfig() {
      const payload = {};
      for (const key of fields) payload[key] = $(key).value;
      for (const key of ["first_run_limit", "fetch_interval_seconds"]) payload[key] = Number(payload[key]);
      payload.request_delay_seconds = Number(payload.request_delay_seconds);
      payload.enabled = $("enabled").checked;
      payload.auto_transfer = $("auto_transfer").checked;
      payload.delete_names = $("delete_names").value.split("\n").map(x => x.trim()).filter(Boolean);
      currentConfig = await api("/api/config", { method: "POST", body: JSON.stringify(payload) });
      msg("配置已保存");
      $("configModal").classList.remove("open");
      renderSummary();
      await refresh();
    }
    function renderItems(items) {
      $("items").innerHTML = items.map(item => {
        const original = (item.provider_links || []).map(link => `<a href="${link.url}" target="_blank">${link.provider}${link.code ? " " + link.code : ""}</a>`).join("");
        const newer = Object.entries(item.new_links || {}).map(([name, link]) => `<a href="${link.url}" target="_blank">新${name}${link.code ? " " + link.code : ""}</a>`).join("");
        return `<div class="item">
          ${item.image_url ? `<img class="thumb" src="${item.image_url}">` : `<div class="thumb"></div>`}
          <div>
            <h3>${item.title}</h3>
            <p>${item.intro || ""}</p>
            <div class="links">${original}${newer}</div>
          </div>
        </div>`;
      }).join("");
    }
    async function refresh() {
      const status = await api("/api/status");
      $("total").textContent = status.total_resources;
      $("transferred").textContent = status.transferred_resources;
      $("inserted").textContent = status.last_inserted;
      $("running").textContent = status.busy ? "忙" : (status.running ? "开" : "停");
      if (status.last_error) msg(status.last_error);
      const resources = await api("/api/resources?limit=30");
      renderItems(resources.items || []);
    }
    $("configBtn").onclick = () => $("configModal").classList.add("open");
    $("closeConfig").onclick = () => $("configModal").classList.remove("open");
    $("configModal").onclick = (event) => {
      if (event.target === $("configModal")) $("configModal").classList.remove("open");
    };
    $("saveBtn").onclick = () => saveConfig().catch(e => msg(e.message));
    $("scanBtn").onclick = async () => {
      msg("扫描更新中...");
      await api("/api/run", { method: "POST", body: JSON.stringify({ transfer: currentConfig.auto_transfer }) }).catch(e => msg(e.message));
      await refresh();
    };
    $("firstBtn").onclick = async () => {
      msg("首次抓取中...");
      await api("/api/run", { method: "POST", body: JSON.stringify({ limit: Number(currentConfig.first_run_limit || 20), transfer: currentConfig.auto_transfer }) }).catch(e => msg(e.message));
      await refresh();
    };
    $("startBtn").onclick = async () => { currentConfig = await api("/api/start", { method: "POST" }); await loadConfig(); await refresh(); };
    $("stopBtn").onclick = async () => { currentConfig = await api("/api/stop", { method: "POST" }); await loadConfig(); await refresh(); };
    loadConfig().then(refresh).catch(e => msg(e.message));
    setInterval(refresh, 10000);
  </script>
</body>
</html>
